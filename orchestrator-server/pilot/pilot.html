<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartOps Foundry — Automation Pilot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090a;--panel:#0f1011;--elevated:#191a1b;
  --border:rgba(255,255,255,.06);--border-strong:rgba(255,255,255,.10);
  --text:#f7f8f8;--mid:#d0d6e0;--light:#8a8f98;--dim:#62666d;
  --accent:#5e6ad2;--accent-light:#7170ff;
  --emerald:#10b981;--amber:#f59e0b;--rose:#f43f5e;--sky:#38bdf8;
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
a{color:var(--accent-light);text-decoration:none}
.wrap{max-width:1180px;margin:0 auto;padding:28px 20px 60px}
header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
h1{font-size:20px;font-weight:600;letter-spacing:-.01em}
h1 .tag{font-size:11px;font-weight:500;color:var(--dim);margin-left:8px;border:1px solid var(--border);padding:2px 8px;border-radius:6px}
.sub{color:var(--light);font-size:13px;margin-top:4px}
.banner{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:20px;border:1px solid}
.banner.sim{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:var(--amber)}
.banner.live{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.25);color:var(--emerald)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
.card h2{font-size:13px;color:var(--mid);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;font-weight:600}
.row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:10px 0;border-top:1px solid var(--border)}
.row:first-of-type{border-top:0}
.row .who{font-weight:500;font-size:14px}
.row .meta{color:var(--light);font-size:12px;margin-top:2px}
.badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.b-pending{background:rgba(245,158,11,.12);color:var(--amber)}
.b-approved{background:rgba(94,106,210,.14);color:var(--accent-light)}
.b-sent{background:rgba(56,189,248,.12);color:var(--sky)}
.b-simulated{background:rgba(245,158,11,.12);color:var(--amber)}
.b-delivered{background:rgba(16,185,129,.12);color:var(--emerald)}
.b-failed{background:rgba(244,63,94,.12);color:var(--rose)}
.b-cancelled{background:rgba(138,143,152,.14);color:var(--light)}
.b-rejected{background:rgba(244,63,94,.10);color:var(--rose)}
.b-replied{background:rgba(16,185,129,.12);color:var(--emerald)}
.btn{cursor:pointer;border:1px solid var(--border-strong);background:var(--elevated);color:var(--text);padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;transition:.15s}
.btn:hover{border-color:var(--accent);color:var(--accent-light)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-light)}
.btn.danger{color:var(--rose)} .btn.danger:hover{border-color:var(--rose)}
.btn.sm{padding:4px 9px;font-size:11px}
.preview{font-size:12px;color:var(--mid);background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-top:6px;white-space:pre-wrap;word-break:break-word;max-height:120px;overflow:auto}
.chan{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em}
form label{display:block;font-size:12px;color:var(--light);margin:10px 0 4px}
form input,textarea{width:100%;background:var(--bg);border:1px solid var(--border-strong);color:var(--text);padding:9px 10px;border-radius:8px;font-family:inherit;font-size:13px}
textarea{resize:vertical;min-height:60px}
.empty{color:var(--dim);font-size:13px;padding:18px 0;text-align:center}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:6px;flex-wrap:wrap}
.tab{padding:8px 12px;font-size:13px;color:var(--light);cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.muted{color:var(--dim);font-size:12px}
.err{color:var(--rose);font-size:12px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--elevated);border:1px solid var(--border-strong);padding:12px 16px;border-radius:10px;font-size:13px;box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;transform:translateY(10px);transition:.2s;z-index:50}
.toast.show{opacity:1;transform:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Automation Pilot <span class="tag" id="mode-tag">…</span></h1>
      <div class="sub">Lead → AI draft SMS + email → approve → send → follow-up → cancel on reply.</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="refresh(true)">Refresh</button>
      <a class="btn" href="/api/pilot/webhooks/health" target="_blank">Webhooks</a>
      <a class="btn" href="/api/pilot/health" target="_blank">Health</a>
    </div>
  </header>

  <div id="banner" class="banner sim" style="display:none"></div>

  <div class="card" style="margin-bottom:18px">
    <h2>1 — Create a lead (website form simulation)</h2>
    <form id="lead-form" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><label>Name</label><input id="l-name" placeholder="Jane Doe" /></div>
      <div><label>Business</label><input id="l-biz" placeholder="Summit Air HVAC" value="Summit Air HVAC" /></div>
      <div><label>Phone (E.164)</label><input id="l-phone" placeholder="+150****0006" /></div>
      <div><label>Email</label><input id="l-email" placeholder="jane@example.com" /></div>
      <div style="grid-column:1/3"><label>Notes</label><input id="l-notes" placeholder="Asked about AC tune-up" /></div>
      <div style="grid-column:1/3;display:flex;gap:8px;align-items:center">
        <button class="btn primary" type="submit">Ingest lead → draft SMS + email</button>
        <span class="muted" id="lead-status"></span>
      </div>
    </form>
  </div>

  <div class="grid">
    <div class="card">
      <h2>2 — Pending approvals</h2>
      <div id="drafts"></div>
    </div>
    <div class="card">
      <h2>3 — Lead queue</h2>
      <div id="leads"></div>
    </div>
    <div class="card">
      <h2>4 — Scheduled automations</h2>
      <div id="schedule"></div>
    </div>
    <div class="card">
      <h2>5 — Automation history</h2>
      <div id="jobs"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = '/api/pilot';
let MODE = { liveMode: false, testMode: true };

async function api(path, opts = {}) {
  const r = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return r.json().catch(() => ({ ok: false, error: 'bad json' }));
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 2600);
}
function esc(s) { return String(s ?? '').replace(/[<>&]/g, c => ({ '<':'&lt;','>':'&gt;','&':'&amp;' }[c])); }
function badge(status) { return `<span class="badge b-${esc(status)}">${esc(status)}</span>`; }

async function refresh() {
  const [h, leads, drafts, sched, jobs] = await Promise.all([
    api('/health'), api('/leads'), api('/drafts'), api('/scheduler'), api('/jobs')
  ]);
  MODE = h;
  const tag = document.getElementById('mode-tag');
  tag.textContent = h.liveMode ? 'LIVE' : (h.testMode ? 'TEST / SIMULATE' : 'SIMULATE');
  const b = document.getElementById('banner');
  b.style.display = 'flex';
  if (h.liveMode) { b.className = 'banner live'; b.innerHTML = '<span class="dot" style="background:var(--emerald)"></span> <b>LIVE MODE</b> — real sends enabled. Twilio + Resend will be called.'; }
  else { b.className = 'banner sim'; b.innerHTML = `<span class="dot" style="background:var(--amber)"></span> <b>SIMULATION MODE</b> — no external APIs called. ${(h.configIssues||[]).join('; ')||'All good.'}`; }
  renderLeads(leads.leads || []);
  renderDrafts(drafts.drafts || []);
  renderSchedule(sched);
  renderJobs(jobs.jobs || []);
}

function renderLeads(list) {
  const el = document.getElementById('leads');
  if (!list.length) { el.innerHTML = '<div class="empty">No leads yet. Create one above.</div>'; return; }
  el.innerHTML = list.map(l => `
    <div class="row">
      <div>
        <div class="who">${esc(l.name||'(no name)')}</div>
        <div class="meta">${esc(l.phone||'—')} · ${esc(l.email||'—')} · ${esc(l.source)} ${badge(l.status)}</div>
      </div>
    </div>`).join('');
}

function renderDrafts(list) {
  const el = document.getElementById('drafts');
  const pending = list.filter(d => d.status === 'pending');
  if (!pending.length) { el.innerHTML = '<div class="empty">No pending drafts. Ingest a lead to generate AI drafts.</div>'; return; }
  el.innerHTML = pending.map(d => `
    <div class="row" style="flex-direction:column;align-items:stretch">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;width:100%">
        <div>
          <div class="who">${esc(d.to)} <span class="chan">${esc(d.channel)}</span></div>
          ${d.subject ? `<div class="meta">subj: ${esc(d.subject)}</div>` : ''}
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn sm primary" onclick="approve('${d.id}')">Approve & send</button>
          <button class="btn sm danger" onclick="reject('${d.id}')">Reject</button>
        </div>
      </div>
      <div class="preview">${esc(d.body)}</div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button class="btn sm" onclick="editDraft('${d.id}')">Edit</button>
      </div>
    </div>`).join('');
}

function renderSchedule(s) {
  const el = document.getElementById('schedule');
  const items = s.schedule || [];
  if (!items.length) { el.innerHTML = `<div class="empty">Nothing scheduled. (test follow-up: ${s.status?.testFollowupMinutes ?? '?'} min)</div>`; return; }
  el.innerHTML = items.map(it => `
    <div class="row">
      <div>
        <div class="who">Lead ${esc(it.leadId.slice(-6))} <span class="chan">${esc(it.channel)}</span></div>
        <div class="meta">run at ${esc(it.runAt)} ${badge(it.status)}</div>
      </div>
      <button class="btn sm danger" onclick="cancelSched('${it.leadId}')">Cancel</button>
    </div>`).join('');
}

function renderJobs(list) {
  const el = document.getElementById('jobs');
  if (!list.length) { el.innerHTML = '<div class="empty">No jobs yet.</div>'; return; }
  el.innerHTML = list.slice(0, 12).map(j => `
    <div class="row">
      <div style="min-width:0">
        <div class="who">${esc(j.channel)} → ${esc(j.to)} ${badge(j.status)}</div>
        <div class="meta">${esc(j.createdAt)} ${j.lastError ? '· <span class="err">'+esc(j.lastError)+'</span>' : ''} ${j.externalId ? '· sid:'+esc(j.externalId.slice(0,10)) : ''}</div>
      </div>
      ${['pending','approved'].includes(j.status) ? `<button class="btn sm danger" onclick="cancelJob('${j.id}')">Cancel</button>` : ''}
    </div>`).join('');
}

async function approve(id) { const r = await api(`/drafts/${id}/approve`, { method: 'POST' }); toast(r.ok ? 'Approved + sent (or simulated)' : ('Error: '+(r.error||'fail'))); refresh(); }
async function reject(id) { const r = await api(`/drafts/${id}/reject`, { method: 'POST' }); toast(r.ok ? 'Rejected' : 'Error'); refresh(); }
async function cancelJob(id) { const r = await api(`/jobs/${id}/cancel`, { method: 'POST' }); toast(r.ok ? 'Cancelled' : 'Error'); refresh(); }
async function cancelSched(leadId) { const r = await api(`/scheduler/cancel/${leadId}`, { method: 'POST' }); toast(r.ok ? `Cancelled ${r.cancelled} follow-up(s)` : 'Error'); refresh(); }

async function editDraft(id) {
  const r = await api('/drafts');
  const d = (r.drafts||[]).find(x => x.id === id);
  if (!d) return;
  const body = prompt('Edit message body:', d.body);
  if (body === null) return;
  const patch = { body, subject: d.subject };
  if (d.subject !== undefined) { const s = prompt('Edit subject (cancel to keep):', d.subject); if (s !== null) patch.subject = s; }
  await api(`/drafts/${id}`, { method: 'PUT', body: JSON.stringify(patch) });
  toast('Saved'); refresh();
}

document.getElementById('lead-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const status = document.getElementById('lead-status'); status.textContent = 'drafting…';
  const payload = {
    name: document.getElementById('l-name').value.trim(),
    businessName: document.getElementById('l-biz').value.trim(),
    phone: document.getElementById('l-phone').value.trim(),
    email: document.getElementById('l-email').value.trim(),
    notes: document.getElementById('l-notes').value.trim(),
    source: 'website_form',
  };
  const r = await api('/leads', { method: 'POST', body: JSON.stringify(payload) });
  status.textContent = '';
  if (r.ok) { toast(`Lead created — ${r.drafts.length} draft(s) generated`); refresh(); }
  else { toast('Error: ' + (r.error || 'failed')); }
});

refresh();
setInterval(refresh, 4000);
</script>
</body>
</html>
