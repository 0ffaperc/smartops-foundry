<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartOps Foundry — Client Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07080a;--bg-sidebar:#0c0d10;--bg-card:#111216;--bg-elevated:#181a1f;
  --border:rgba(255,255,255,.05);--border-strong:rgba(255,255,255,.09);
  --text:#eef0f2;--text-2:#a8adb8;--text-3:#6b6f76;--text-4:#454850;
  --accent:#6366f1;--accent-light:#818cf8;--accent-bg:rgba(99,102,241,.08);
  --emerald:#10b981;--emerald-bg:rgba(16,185,129,.08);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,.08);
  --rose:#f43f5e;--rose-bg:rgba(244,63,94,.08);
  --cyan:#06b6d4;--cyan-bg:rgba(6,182,212,.08);
  --violet:#a78bfa;--violet-bg:rgba(167,139,250,.08);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;line-height:1.5;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.05);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.1)}
::selection{background:var(--accent-bg);color:var(--accent-light)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;outline:none}

/* Layout */
.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}
.sidebar{background:var(--bg-sidebar);border-right:1px solid var(--border);padding:18px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.main-area{padding:28px 32px;max-width:1100px}

/* Sidebar */
.sb-brand{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;letter-spacing:-.02em;padding-bottom:16px;margin-bottom:12px;border-bottom:1px solid var(--border)}
.sb-biz{padding:0 6px 14px;margin-bottom:10px;border-bottom:1px solid var(--border)}
.sb-biz .biz-name{font-size:15px;font-weight:600;letter-spacing:-.01em}
.sb-biz .biz-tag{font-size:11px;color:var(--text-4);margin-top:1px}
.sb-nav{flex:1;display:flex;flex-direction:column;gap:2px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;font-size:13px;font-weight:500;color:var(--text-3);transition:all .15s;cursor:pointer;width:100%;text-align:left}
.sb-item:hover{background:rgba(255,255,255,.03);color:var(--text-2)}
.sb-item.active{background:var(--accent-bg);color:var(--accent-light)}
.sb-item .si-icon{font-size:16px;width:20px;text-align:center}
.sb-item .si-badge{margin-left:auto;font-size:9px;font-weight:600;padding:2px 7px;border-radius:999px;background:rgba(255,255,255,.05);color:var(--text-4)}
.sb-item.active .si-badge{background:var(--accent-bg);color:var(--accent-light)}
.sb-bottom{padding-top:14px;border-top:1px solid var(--border);margin-top:auto}
.sb-user{display:flex;align-items:center;gap:9px;padding:6px}
.sb-user .avatar{width:32px;height:32px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.sb-user .su-name{font-size:12px;font-weight:500}
.sb-user .su-plan{font-size:10px;color:var(--text-4)}
.sb-logout{padding:5px;border:none;color:var(--text-4);cursor:pointer;border-radius:5px;font-size:14px}
.sb-logout:hover{color:var(--rose);background:var(--rose-bg)}

/* Panels */
.panel{display:none;animation:fadeIn .2s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Panel header */
.panel-head{margin-bottom:24px}
.panel-head h1{font-size:24px;font-weight:600;letter-spacing:-.02em}
.panel-head p{font-size:14px;color:var(--text-3);margin-top:3px}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:18px;transition:border-color .15s}
.card:hover{border-color:var(--border-strong)}
.card-h{font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat .s-val{font-size:26px;font-weight:600;letter-spacing:-.03em}
.stat .s-lbl{font-size:11px;color:var(--text-3);font-weight:500;margin-top:1px}
.stat .s-trend{font-size:11px;font-weight:600;margin-top:4px}
.stat .s-trend.up{color:var(--emerald)}
.stat .s-trend.down{color:var(--rose)}
.stat .s-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:6px}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.g2-uneven{display:grid;grid-template-columns:1.6fr 1fr;gap:12px;margin-bottom:16px}

/* Chart */
.chart-box{position:relative;height:220px}

/* Lists */
.rows{display:flex;flex-direction:column;gap:5px}
.row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;transition:all .15s}
.row:hover{background:rgba(255,255,255,.035);border-color:var(--border-strong)}
.row .r-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.row .r-body{flex:1;min-width:0}
.row .r-title{font-size:12px;font-weight:500}
.row .r-sub{font-size:11px;color:var(--text-3);margin-top:1px}
.row .r-tag{padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;white-space:nowrap}
.tag-on{background:var(--emerald-bg);color:var(--emerald)}
.tag-draft{background:var(--amber-bg);color:var(--amber)}
.tag-pending{background:var(--rose-bg);color:var(--rose)}

/* Progress */
.prog-item{margin-bottom:14px}
.prog-head{display:flex;justify-content:space-between;margin-bottom:5px}
.prog-lbl{font-size:12px;font-weight:500;color:var(--text-2)}
.prog-val{font-size:12px;font-weight:600}
.prog-track{height:7px;background:rgba(255,255,255,.03);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;border-radius:999px;transition:width .6s}

/* Ring */
.ring-wrap{display:flex;align-items:center;justify-content:center;padding:10px}
.ring{position:relative;width:120px;height:120px}
.ring svg{transform:rotate(-90deg)}
.ring .ring-val{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring .ring-num{font-size:22px;font-weight:600}
.ring .ring-lbl{font-size:10px;color:var(--text-4)}

/* Chatbot per tab */
.chat-box{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;height:400px}
.chat-h{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.chat-h .ch-ic{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px}
.chat-h h4{font-size:12px;font-weight:600}
.chat-h p{font-size:10px;color:var(--text-4)}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:5px}
.cm{max-width:85%;padding:8px 11px;border-radius:9px;font-size:12px;line-height:1.5}
.cm.bot{background:rgba(255,255,255,.035);color:var(--text-2);align-self:flex-start;border-bottom-left-radius:3px}
.cm.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.cm-typing{font-size:12px;color:var(--text-4);font-style:italic;align-self:flex-start}
.chat-in{padding:9px;border-top:1px solid var(--border);display:flex;gap:5px}
.chat-in input{flex:1;padding:7px 10px;font-size:12px;border:1px solid var(--border-strong);border-radius:6px;background:var(--bg);color:var(--text)}
.chat-in input:focus{border-color:var(--accent)}
.chat-in button{padding:7px 13px;font-size:12px;font-weight:500;border-radius:6px;background:var(--accent);color:#fff}
.chat-in button:disabled{opacity:.4}

/* Edit request */
.btn-edit{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;font-size:12px;font-weight:500;border-radius:7px;background:var(--accent-bg);color:var(--accent-light);border:1px solid rgba(99,102,241,.15);transition:all .15s;cursor:pointer}
.btn-edit:hover{background:rgba(99,102,241,.15)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:200}
.modal-bg.show{display:flex}
.modal-box{background:var(--bg-card);border:1px solid var(--border-strong);border-radius:12px;width:100%;max-width:440px;padding:22px}
.modal-box h3{font-size:16px;font-weight:600;margin-bottom:5px}
.modal-box p{font-size:13px;color:var(--text-3);margin-bottom:14px}
.modal-box textarea{width:100%;min-height:90px;padding:10px;font-size:13px;border:1px solid var(--border-strong);border-radius:8px;background:var(--bg);color:var(--text);resize:vertical}
.modal-box textarea:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.btn-send{padding:8px 18px;font-size:13px;font-weight:500;border-radius:7px;background:var(--accent);color:#fff;cursor:pointer}
.btn-cancel{padding:8px 18px;font-size:13px;font-weight:500;border-radius:7px;background:rgba(255,255,255,.03);color:var(--text-3);border:1px solid var(--border);cursor:pointer}

/* Funnel */
.funnel-step{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.funnel-step:last-child{border:none}
.funnel-bar{height:24px;border-radius:5px;display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:600;color:#fff;transition:width .5s}
.funnel-label{font-size:12px;color:var(--text-2);min-width:100px}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.cal-day{aspect-ratio:1;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;padding:5px;font-size:10px;position:relative;overflow:hidden}
.cal-day .cal-num{font-size:10px;color:var(--text-3);font-weight:600}
.cal-day .cal-dot{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%}
.cal-day.today{border-color:var(--accent)}
.cal-day .cal-event{font-size:9px;padding:1px 3px;border-radius:3px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Campaign cards */
.camp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.camp-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:14px;transition:all .15s}
.camp-card:hover{border-color:var(--border-strong);background:rgba(255,255,255,.035)}
.camp-card .cc-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.camp-card .cc-title{font-size:13px;font-weight:600}
.camp-card .cc-stats{display:flex;gap:14px;margin-top:10px}
.camp-card .cc-stat{font-size:11px}
.camp-card .cc-stat strong{display:block;font-size:16px;font-weight:600}

/* Empty state */
.empty{text-align:center;padding:30px;color:var(--text-4)}
.empty p{font-size:13px;margin-top:6px}

/* Responsive */
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:12px}
  .sb-nav{flex-direction:row;overflow-x:auto;gap:4px}
  .sb-item{white-space:nowrap;padding:7px 10px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .g2,.g3,.g2-uneven,.camp-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-brand" data-sof-logo data-sof-size="22" data-sof-variant="light" data-sof-text="true"></div>
    <div class="sb-biz">
      <div class="biz-name" id="bizName">Loading...</div>
      <div class="biz-tag" id="bizIndustry">—</div>
    </div>
    <nav class="sb-nav" id="sideNav">
      <button class="sb-item active" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="si-icon">🏠</span> Dashboard</button>
      <button class="sb-item" data-tab="leads" onclick="switchTab('leads')"><span class="si-icon">📡</span> Leads <span class="si-badge" id="badgeLeads">—</span></button>
      <button class="sb-item" data-tab="marketing" onclick="switchTab('marketing')"><span class="si-icon">📣</span> Marketing <span class="si-badge" id="badgeMkt">—</span></button>
      <button class="sb-item" data-tab="goals" onclick="switchTab('goals')"><span class="si-icon">🎯</span> Goals <span class="si-badge" id="badgeGoals">—</span></button>
      <button class="sb-item" data-tab="schedule" onclick="switchTab('schedule')"><span class="si-icon">📅</span> Schedule <span class="si-badge" id="badgeSched">—</span></button>
      <button class="sb-item" data-tab="reports" onclick="switchTab('reports')"><span class="si-icon">📈</span> Reports</button>
    </nav>
    <div class="sb-bottom">
      <div class="sb-user">
        <div class="avatar" id="userAvatar">U</div>
        <div style="flex:1;min-width:0">
          <div class="su-name" id="userName">User</div>
          <div class="su-plan" id="userPlan">—</div>
        </div>
        <button class="sb-logout" onclick="logout()" title="Sign out">⏻</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-area" id="mainArea"></main>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal-box">
    <h3>Request a Change</h3>
    <p>Tell your account manager what you'd like updated. They'll handle it and confirm with you.</p>
    <textarea id="editText" placeholder="e.g. 'Add a spring discount to the seasonal campaign'"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-send" onclick="submitEditRequest()">Send Request</button>
    </div>
  </div>
</div>

<script src="/sof-logo.js"></script>
<script src="/client-app.js"></script>
<script src="/client-app-part2.js"></script>
<script>init();</script>
</body>
</html>
