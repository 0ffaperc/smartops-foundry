<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Ops Agency — Automation Platform</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #f1f4f9;
  --bg-soft: #f8faff;
  --card: #ffffff;
  --card-hover: #fafbff;
  --border: #e2e8f0;
  --border-strong: #cbd5e1;
  --text: #0f172a;
  --text-mid: #475569;
  --text-light: #94a3b8;
  --accent: #4f46e5;
  --accent-light: #6366f1;
  --accent-bg: #eef2ff;
  --accent-glow: rgba(79,70,229,0.25);
  --sky: #0ea5e9;
  --sky-bg: #e0f2fe;
  --violet: #8b5cf6;
  --violet-bg: #f3e8ff;
  --emerald: #10b981;
  --emerald-bg: #d1fae5;
  --amber: #f59e0b;
  --amber-bg: #fef3c7;
  --rose: #f43f5e;
  --rose-bg: #ffe4e6;
  --shadow-sm: 0 1px 2px rgba(15,23,42,0.04);
  --shadow: 0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
  --shadow-md: 0 4px 6px -1px rgba(15,23,42,0.07), 0 2px 4px -2px rgba(15,23,42,0.05);
  --shadow-lg: 0 10px 25px -3px rgba(15,23,42,0.10), 0 4px 10px -4px rgba(15,23,42,0.06);
  --shadow-glow: 0 0 0 3px var(--accent-glow);
  --radius: 14px;
  --radius-sm: 10px;
  --radius-lg: 18px;
}
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  line-height: 1.5;
}
::-webkit-scrollbar { width:7px; height:7px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
::selection { background: var(--accent-bg); color: var(--accent); }

/* ===== Layout ===== */
.app { display:grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
.sidebar {
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 24px 18px;
  position: sticky; top:0; height: 100vh; overflow-y: auto;
  display: flex; flex-direction: column;
}
.main { padding: 28px 32px; max-width: 1400px; }
.brand {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 20px; margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.brand-icon {
  width: 42px; height: 42px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px var(--accent-glow);
}
.brand-icon svg { width: 22px; height: 22px; color: white; }
.brand-text h1 { font-size: 16px; font-weight: 800; letter-spacing: -0.02em; }
.brand-text p { font-size: 11px; color: var(--text-light); font-weight: 500; }

/* ===== Client list ===== */
.section-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-light);
  padding: 0 8px; margin-bottom: 8px;
}
.client-list { flex: 1; display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.client-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  cursor: pointer; border: 1.5px solid transparent;
  transition: all 0.2s ease;
}
.client-item:hover { background: var(--bg-soft); }
.client-item.active {
  background: var(--accent-bg); border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.client-avatar {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
  color: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; flex-shrink: 0;
}
.client-item.active .client-avatar {
  background: linear-gradient(135deg, var(--accent), #7c3aed); color: white;
}
.client-info { flex: 1; min-width: 0; }
.client-info .name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.client-info .industry { font-size: 11px; color: var(--text-light); text-transform: capitalize; }
.client-delete { opacity: 0; color: var(--text-light); padding: 4px; border-radius: 6px; transition: all 0.15s; cursor: pointer; }
.client-item:hover .client-delete { opacity: 1; }
.client-delete:hover { color: var(--rose); background: var(--rose-bg); }

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 18px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: 1.5px solid transparent; transition: all 0.2s ease;
  font-family: inherit; white-space: nowrap;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary {
  background: var(--accent); color: white; border-color: var(--accent);
  box-shadow: 0 1px 3px var(--accent-glow);
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent-light); box-shadow: 0 4px 16px var(--accent-glow), 0 0 0 3px var(--accent-glow);
  transform: translateY(-1px);
}
.btn-secondary { background: var(--card); color: var(--text-mid); border-color: var(--border-strong); }
.btn-secondary:hover:not(:disabled) { background: var(--bg-soft); border-color: var(--accent); color: var(--accent); }
.btn-sky { background: var(--sky-bg); color: var(--sky); border-color: #bae6fd; }
.btn-sky:hover:not(:disabled) { background: #bae6fd; box-shadow: 0 4px 14px rgba(14,165,233,0.25); transform: translateY(-1px); }
.btn-violet { background: var(--violet-bg); color: var(--violet); border-color: #ddd6fe; }
.btn-violet:hover:not(:disabled) { background: #ddd6fe; box-shadow: 0 4px 14px rgba(139,92,246,0.25); transform: translateY(-1px); }
.btn-emerald { background: var(--emerald-bg); color: #047857; border-color: #a7f3d0; }
.btn-emerald:hover:not(:disabled) { background: #a7f3d0; box-shadow: 0 4px 14px rgba(16,185,129,0.25); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--text-mid); border-color: var(--border); }
.btn-ghost:hover:not(:disabled) { background: var(--bg-soft); color: var(--accent); }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-block { width: 100%; }

/* ===== Cards ===== */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
  transition: all 0.2s ease;
}
.card-hover:hover {
  box-shadow: var(--shadow-md); border-color: var(--border-strong);
  transform: translateY(-2px);
}
.card-body { padding: 20px; }
.card-body-sm { padding: 16px; }

/* ===== Header ===== */
.page-header {
  display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
}
.page-header .avatar {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent-bg), #e0e7ff);
  color: var(--accent); border: 1.5px solid #c7d2fe;
}
.page-header h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
.page-header p { font-size: 13px; color: var(--text-mid); margin-top: 2px; }
.badge-row { margin-left: auto; display: flex; gap: 8px; }
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 999px;
  font-size: 11px; font-weight: 600; border: 1px solid;
}
.badge-on { background: var(--emerald-bg); color: #047857; border-color: #a7f3d0; }
.badge-off { background: var(--bg-soft); color: var(--text-light); border-color: var(--border); }
.badge-sky { background: var(--sky-bg); color: #0284c7; border-color: #bae6fd; }
.badge-violet { background: var(--violet-bg); color: #7c3aed; border-color: #ddd6fe; }
.badge-amber { background: var(--amber-bg); color: #b45309; border-color: #fde68a; }
.badge-rose { background: var(--rose-bg); color: #be123c; border-color: #fda4af; }
.badge-accent { background: var(--accent-bg); color: var(--accent); border-color: #c7d2fe; }

/* ===== Tabs ===== */
.tabs {
  display: flex; gap: 2px; padding: 0 4px;
  border-bottom: 1px solid var(--border); margin-bottom: 24px;
  overflow-x: auto; background: var(--card);
  border-radius: var(--radius) var(--radius) 0 0;
  border: 1px solid var(--border); border-bottom: none;
}
.tab {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 18px; font-size: 13px; font-weight: 600;
  color: var(--text-light); cursor: pointer; white-space: nowrap;
  border: none; background: none; border-bottom: 2.5px solid transparent;
  transition: all 0.2s ease; font-family: inherit; position: relative;
}
.tab:hover { color: var(--text-mid); background: var(--bg-soft); }
.tab.active {
  color: var(--accent); border-bottom-color: var(--accent);
}
.tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 15%; right: 15%;
  height: 2.5px; background: var(--accent); border-radius: 999px;
  box-shadow: 0 0 10px var(--accent-glow);
}
.tab-count {
  padding: 2px 7px; border-radius: 999px; font-size: 10px; font-weight: 700;
  background: var(--bg); color: var(--text-light);
}
.tab.active .tab-count { background: var(--accent-bg); color: var(--accent); }
.tab-icon { width: 16px; height: 16px; }

/* ===== Inputs ===== */
.field { margin-bottom: 16px; }
.field-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-mid); margin-bottom: 6px; }
.input, .textarea, .select {
  width: 100%; padding: 11px 14px; font-size: 13px;
  border: 1.5px solid var(--border-strong); border-radius: var(--radius-sm);
  background: var(--card); color: var(--text);
  font-family: inherit; outline: none; transition: all 0.2s ease;
}
.input:focus, .textarea:focus, .select:focus {
  border-color: var(--accent); box-shadow: var(--shadow-glow);
}
.input::placeholder, .textarea::placeholder { color: var(--text-light); }
.textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
.select {
  appearance: none; -webkit-appearance: none; cursor: pointer;
  background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 12px center; padding-right: 36px;
}
select option { background: var(--card); color: var(--text); padding: 8px; }
select optgroup { background: var(--bg-soft); color: var(--accent); font-weight: 700; font-size: 11px; text-transform: uppercase; }

/* ===== Stat cards ===== */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm);
  transition: all 0.2s ease;
}
.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--border-strong); }
.stat-card .stat-top { display: flex; align-items: center; justify-content: between; margin-bottom: 12px; }
.stat-card .stat-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
}
.stat-card .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -0.03em; }
.stat-card .stat-label { font-size: 12px; color: var(--text-light); font-weight: 500; margin-top: 2px; }

/* ===== Two col grid ===== */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

/* ===== List items ===== */
.list-item {
  display: flex; align-items: center; gap: 14px; padding: 16px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
  transition: all 0.2s ease;
}
.list-item:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); transform: translateY(-1px); }
.list-item .li-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; flex-shrink: 0;
  background: linear-gradient(135deg, var(--sky-bg), #bae6fd); color: #0284c7;
}
.list-item .li-body { flex: 1; min-width: 0; }
.list-item .li-title { font-size: 14px; font-weight: 600; color: var(--text); }
.list-item .li-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.tag-row { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.tag {
  padding: 3px 9px; border-radius: 999px; font-size: 10px; font-weight: 600;
  background: var(--bg-soft); color: var(--text-mid); border: 1px solid var(--border);
}

/* ===== Section header ===== */
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-head h3 { font-size: 14px; font-weight: 700; color: var(--text-mid); }

/* ===== Empty state ===== */
.empty {
  text-align: center; padding: 48px 20px; color: var(--text-light);
}
.empty .empty-icon { width: 48px; height: 48px; margin: 0 auto 12px; opacity: 0.3; }
.empty p { font-size: 14px; }

/* ===== Info banner ===== */
.info-banner {
  display: flex; align-items: flex-start; gap: 14px; padding: 18px;
  border-radius: var(--radius); margin-bottom: 20px;
}
.info-banner .ib-icon {
  width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.info-banner h4 { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.info-banner p { font-size: 13px; color: var(--text-mid); }
.info-violet { background: linear-gradient(135deg, var(--violet-bg), #faf5ff); border: 1px solid #ddd6fe; }
.info-violet .ib-icon { background: var(--violet); color: white; }
.info-sky { background: linear-gradient(135deg, var(--sky-bg), #f0f9ff); border: 1px solid #bae6fd; }
.info-sky .ib-icon { background: var(--sky); color: white; }
.info-emerald { background: linear-gradient(135deg, var(--emerald-bg), #ecfdf5); border: 1px solid #a7f3d0; }
.info-emerald .ib-icon { background: var(--emerald); color: white; }
.info-amber { background: linear-gradient(135deg, var(--amber-bg), #fffbeb); border: 1px solid #fde68a; }
.info-amber .ib-icon { background: var(--amber); color: white; }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,0.4); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center; z-index: 100;
  padding: 20px; animation: fadeIn 0.15s ease;
}
.modal {
  background: var(--card); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg); width: 100%; max-width: 460px;
  max-height: 85vh; overflow-y: auto; animation: slideUp 0.2s ease;
}
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px; border-bottom: 1px solid var(--border);
}
.modal-head h3 { font-size: 16px; font-weight: 700; }
.modal-close {
  width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer;
  background: var(--bg-soft); color: var(--text-light); display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--rose-bg); color: var(--rose); }
.modal-body { padding: 24px; }
.modal-body .field:last-child { margin-bottom: 0; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 10px; padding: 12px 20px;
  border-radius: 12px; box-shadow: var(--shadow-lg); z-index: 200;
  font-size: 13px; font-weight: 600; animation: toastIn 0.2s ease;
}
.toast-success { background: var(--emerald); color: white; }
.toast-error { background: var(--rose); color: white; }
.toast-info { background: var(--accent); color: white; }
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }

/* ===== Progress bar ===== */
.progress-row { display: flex; align-items: center; gap: 12px; }
.progress-track { flex: 1; height: 8px; background: var(--bg); border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--emerald), #34d399); border-radius: 999px; transition: width 0.5s ease; }
.progress-label { font-size: 12px; font-weight: 700; color: var(--text-mid); min-width: 36px; text-align: right; }

/* ===== SWOT grid ===== */
.swot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.swot-card { padding: 16px; border-radius: var(--radius); border: 1.5px solid; }
.swot-card h5 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
.swot-card ul { list-style: none; }
.swot-card li { font-size: 12px; color: var(--text-mid); padding: 3px 0; padding-left: 14px; position: relative; }
.swot-card li::before { content: '•'; position: absolute; left: 2px; opacity: 0.5; }
.swot-s { background: #ecfdf5; border-color: #a7f3d0; } .swot-s h5 { color: #047857; }
.swot-w { background: #fff1f2; border-color: #fda4af; } .swot-w h5 { color: #be123c; }
.swot-o { background: #f0f9ff; border-color: #bae6fd; } .swot-o h5 { color: #0284c7; }
.swot-t { background: #fffbeb; border-color: #fde68a; } .swot-t h5 { color: #b45309; }

/* ===== Spinner ===== */
.spinner { width: 18px; height: 18px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; }
.spinner-sm { width: 14px; height: 14px; border-width: 2px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Message bubble ===== */
.msg-body {
  font-size: 13px; color: var(--text-mid); line-height: 1.6;
  background: var(--bg-soft); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px;
  white-space: pre-wrap; max-height: 180px; overflow-y: auto; margin-bottom: 12px;
}

/* ===== Misc ===== */
.text-mono { font-family: 'JetBrains Mono', monospace; }
.text-light { color: var(--text-light); }
.text-mid { color: var(--text-mid); }
.mt-2 { margin-top: 8px; }
.mt-3 { margin-top: 12px; }
.mt-4 { margin-top: 16px; }
.mb-3 { margin-bottom: 12px; }
.mb-4 { margin-bottom: 16px; }
.flex { display: flex; }
.items-center { align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.hidden { display: none; }
.flex-1 { flex: 1; }
.flex-wrap { flex-wrap: wrap; }
.cat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-light); margin: 14px 0 8px; padding: 0 4px; }
.cat-label:first-child { margin-top: 0; }
.auto-pick {
  display: flex; align-items: flex-start; gap: 10px; padding: 12px;
  border-radius: var(--radius-sm); border: 1.5px solid var(--border);
  background: var(--card); cursor: pointer; text-align: left;
  transition: all 0.15s; width: 100%; font-family: inherit;
}
.auto-pick:hover { border-color: var(--accent); background: var(--bg-soft); }
.auto-pick.selected { border-color: var(--accent); background: var(--accent-bg); box-shadow: var(--shadow-glow); }
.auto-pick .ap-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.auto-pick .ap-title { font-size: 13px; font-weight: 600; }
.auto-pick .ap-desc { font-size: 11px; color: var(--text-light); margin-top: 1px; }
.chip {
  display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px;
  border-radius: 999px; font-size: 11px; font-weight: 600;
  background: var(--bg-soft); border: 1px solid var(--border); color: var(--text-mid);
}
.icon-bg-sky { background: var(--sky-bg); color: var(--sky); }
.icon-bg-violet { background: var(--violet-bg); color: var(--violet); }
.icon-bg-emerald { background: var(--emerald-bg); color: #047857; }
.icon-bg-amber { background: var(--amber-bg); color: #b45309; }
.icon-bg-accent { background: var(--accent-bg); color: var(--accent); }
.icon-bg-rose { background: var(--rose-bg); color: var(--rose); }
.divider { height: 1px; background: var(--border); margin: 16px 0; border: none; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand" data-sof-logo data-sof-size="38" data-sof-variant="dark" data-sof-animated="true" style="color:var(--text);padding-bottom:20px;margin-bottom:16px;border-bottom:1px solid var(--border);">
      <!-- Animated S logo mounts here -->
    </div>
    <div class="flex items-center gap-2 mb-3">
      <div class="section-label flex-1" style="margin:0;">Clients</div>
      <button class="btn btn-primary btn-sm" onclick="openAddClient()">+ Add</button>
    </div>
    <div class="client-list" id="clientList"></div>
    <div class="card card-body-sm" style="background:var(--bg-soft);">
      <p style="font-size:11px;color:var(--text-light);font-weight:600;margin-bottom:4px;">Backend Status</p>
      <p id="backendStatus" style="font-size:12px;color:var(--emerald);font-weight:600;">● Checking...</p>
    </div>
    <div class="card card-body-sm" style="background:var(--bg-soft);margin-top:8px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div id="userAvatar" style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#7c3aed);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;">?</div>
        <div style="flex:1;min-width:0;">
          <p id="userName" style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Loading...</p>
          <p id="userPlan" style="font-size:10px;color:var(--text-light);text-transform:capitalize;">—</p>
        </div>
        <button onclick="logout()" style="border:none;background:transparent;color:var(--text-light);cursor:pointer;padding:6px;border-radius:6px;font-size:14px;" title="Sign out">⏻</button>
      </div>
    </div>
  </aside>

  <main class="main" id="mainContent">
    <div class="empty" id="noClient">
      <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>
      <p>Select or create a client to begin</p>
    </div>
    <div id="clientView" class="hidden"></div>
  </main>
</div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>
<script src="/sof-logo.js"></script>
<script src="/agency-app.js"></script>
</body>
</html>
